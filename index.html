<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="container py-4 py-md-5">
    <section class="hero rounded-4 p-4 p-md-5 shadow-sm">
      <h1 class="display-6 fw-semibold mb-2">Weather Forecast</h1>
      <p class="lead mb-4">Search by city name or zip code to view current conditions and daily forecast.</p>

      <form id="weather-form" class="row g-3 align-items-end">
        <div class="col-12 col-md-6">
          <label for="query" class="form-label">City or Zip Code</label>
          <input
            id="query"
            class="form-control form-control-lg"
            type="text"
            placeholder="New Castle or 19720"
            required
          />
        </div>

        <div class="col-12 col-md-3">
          <label for="days" class="form-label">Forecast Days</label>
          <select id="days" class="form-select form-select-lg">
            <option value="" selected>Default (5)</option>
            <option value="1">1 day</option>
            <option value="2">2 days</option>
            <option value="3">3 days</option>
            <option value="4">4 days</option>
            <option value="5">5 days</option>
          </select>
        </div>

        <div class="col-12 col-md-3 d-grid">
          <button class="btn btn-primary btn-lg" type="submit">
            <span class="bi bi-search me-2"></span>
            Get Weather
          </button>
        </div>
      </form>

      <p id="forecast-note" class="text-muted mt-3 mb-0 small"></p>
    </section>

    <section id="status" class="mt-4" aria-live="polite"></section>

    <section id="results" class="mt-4 d-none">
      <div class="current-card rounded-4 p-4 shadow-sm mb-4">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
          <div>
            <h2 id="location" class="h3 mb-1"></h2>
            <p id="current-description" class="mb-0 text-capitalize"></p>
          </div>
          <div class="d-flex align-items-center gap-3">
            <img id="current-icon" alt="Weather icon" width="80" height="80" />
            <div>
              <p id="current-temp" class="display-6 mb-0"></p>
              <p id="current-meta" class="mb-0 text-muted small"></p>
            </div>
          </div>
        </div>
      </div>

      <h3 class="h4 mb-3">Daily Forecast</h3>
      <div id="forecast-grid" class="row g-3"></div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
